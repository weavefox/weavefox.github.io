<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeaveFox | AI Agent Infra</title>
    <meta
      name="description"
      content="WeaveFox 致力于构建稳定、高效、可观测的 AI Agent 基础设施，让团队更快把智能体落地到真实业务。"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://mdn.alipayobjects.com/huamei_291gks/afts/img/A*aXZnQ7ncguMAAAAAAAAAAAAADiqGAQ/original"
    />
    <style>
      :root {
        --bg-1: #070b16;
        --bg-2: #0b132b;
        --line: rgba(255, 255, 255, 0.18);
        --text: #f4f7ff;
        --muted: #b1bdd8;
        --accent: #69e6ff;
        --accent-2: #8d7dff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(105, 230, 255, 0.24), transparent 40%),
          radial-gradient(circle at 90% 0%, rgba(141, 125, 255, 0.28), transparent 45%),
          linear-gradient(120deg, var(--bg-1) 10%, var(--bg-2) 90%);
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(1100px, 100%);
        min-height: min(92vh, 760px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(150deg, rgba(15, 25, 53, 0.88), rgba(8, 14, 31, 0.9));
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        padding: clamp(28px, 4vw, 56px);
        position: relative;
        overflow: hidden;
      }

      .shell::before,
      .shell::after {
        content: '';
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 999px;
        filter: blur(80px);
        opacity: 0.32;
        z-index: 0;
      }

      .shell::before {
        background: var(--accent);
        top: -120px;
        right: -80px;
      }

      .shell::after {
        background: var(--accent-2);
        bottom: -120px;
        left: -80px;
      }

      .content {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 20px;
      }

      .badge {
        display: inline-flex;
        width: fit-content;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.06);
        color: #d7e5ff;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 6vw, 68px);
        line-height: 1.06;
        letter-spacing: -0.02em;
        max-width: 14ch;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(15px, 2.3vw, 20px);
        line-height: 1.7;
        max-width: 62ch;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta span {
        padding: 8px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
        font-size: 13px;
        color: #dbe6ff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 22px;
        border-radius: 12px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .btn-primary {
        color: #06152b;
        background: linear-gradient(95deg, #64edff, #9db6ff 55%, #a385ff);
        box-shadow: 0 12px 24px rgba(72, 178, 255, 0.35);
      }

      .btn-secondary {
        color: #dbe5ff;
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.06);
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-secondary:hover {
        border-color: rgba(255, 255, 255, 0.55);
      }

      @media (max-width: 768px) {
        .shell {
          min-height: auto;
          border-radius: 22px;
          padding: 24px;
        }

        .actions,
        .meta {
          flex-direction: column;
          align-items: stretch;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="WeaveFox 产品介绍页面">
      <section class="content">
        <span class="badge">AI Agent Infra</span>
        <h1>Build Reliable AI Agent Systems with WeaveFox</h1>
        <p>
          WeaveFox 专注于 AI Agent 基础设施，帮助团队快速构建、调试、评估和演进面向真实业务的智能体系统。
          从开发到上线，提供更稳定、更可控、更高性能的工程化支撑。
        </p>
        <div class="meta" aria-label="产品能力标签">
          <span>Agent Development</span>
          <span>Evaluation & Observability</span>
          <span>Production Reliability</span>
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="https://www.weavefox.cn/" target="_blank" rel="noopener noreferrer">
            访问 WeaveFox 官网
          </a>
          <a class="btn btn-secondary" href="https://docs.weavefox.ai/" target="_blank" rel="noopener noreferrer">
            查看产品文档
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
